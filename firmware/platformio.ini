; PlatformIO project for the Arduino Nano that drives the steering servo.
;
; Build + upload:
;   cd firmware
;   pio run -t upload
;   pio device monitor
;
; Most Nano clones ship with the OLD bootloader at 57600 baud. If you have a
; genuine / new-bootloader Nano, switch to the [env:nano_new] block below
; (change default_envs, or pass `-e nano_new` on the CLI).

[platformio]
default_envs = nano_new

[env:nano_old]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2

[env:nano_new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2
