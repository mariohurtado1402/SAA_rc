; PlatformIO project for the Arduino Nano that drives the ESC signal line.
;
; Build + upload:
;   cd firmware/esc
;   pio run -t upload
;   pio device monitor
;
; IMPORTANT: disconnect the ESC (or keep the car's wheels off the ground)
; the first time you upload, since the sketch arms the ESC 3 s after boot.

[platformio]
default_envs = nano_new

[env:nano_old]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2

[env:nano_new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2
