; PlatformIO project for the Arduino Nano that reads 3x HC-SR04 ultrasonic
; sensors and drives 2 LEDs + a pulsing buzzer when an obstacle is too close.
;
; Build + upload:
;   cd firmware/proximity
;   pio run -t upload
;   pio device monitor

[platformio]
default_envs = nano_new

[env:nano_old]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
monitor_speed = 115200

[env:nano_new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
