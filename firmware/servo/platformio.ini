; PlatformIO project for the Arduino Nano that drives the steering SERVO.
;
; Build + upload:
;   cd firmware/servo
;   pio run -t upload
;   pio device monitor
;
; If `nano_new` fails with `stk500_getsync: not in sync`, switch to nano_old
; (clones with the old bootloader at 57600 baud).

[platformio]
default_envs = nano_new

[env:nano_old]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 57600
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2

[env:nano_new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
lib_deps = arduino-libraries/Servo@^1.2.2
